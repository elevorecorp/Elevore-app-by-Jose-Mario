name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect correct project folder
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "project_path=." >> $GITHUB_OUTPUT
          elif [ -f Elevore-app-by-Jose-Mario/package.json ]; then
            echo "project_path=Elevore-app-by-Jose-Mario" >> $GITHUB_OUTPUT
          else
            echo "No package.json found"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.detect.outputs.project_path }}

      - name: Build
        run: npm run build
        working-directory: ${{ steps.detect.outputs.project_path }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '${{ steps.detect.outputs.project_path }}/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
